// ═══════════════════════════════════════════════════════════════════
// BAYESIAN ENGINE
// ═══════════════════════════════════════════════════════════════════

const DEFAULT_PENETRANCE = 0.01; // P(signe | maladie) si non listé
const FALSE_POSITIVE_RATE = 0.005; // P(signe présent | maladie ne l'a pas)

function computePosteriors(diseases, observedPresent, observedAbsent) {
  // Prior = prévalence normalisée
  const totalPrev = diseases.reduce((s, d) => s + d.prevalence, 0);
  let posteriors = diseases.map(d => ({
    ...d,
    logLikelihood: Math.log(d.prevalence / totalPrev),
  }));

  // Update pour chaque signe PRESENT
  for (const hpo of observedPresent) {
    for (let i = 0; i < posteriors.length; i++) {
      const pen = posteriors[i].phenotypes[hpo] || DEFAULT_PENETRANCE;
      posteriors[i].logLikelihood += Math.log(pen);
    }
  }

  // Update pour chaque signe ABSENT
  for (const hpo of observedAbsent) {
    for (let i = 0; i < posteriors.length; i++) {
      const pen = posteriors[i].phenotypes[hpo] || DEFAULT_PENETRANCE;
      posteriors[i].logLikelihood += Math.log(1 - pen);
    }
  }

  // Normaliser en probabilités
  const maxLL = Math.max(...posteriors.map(p => p.logLikelihood));
  const expScores = posteriors.map(p => Math.exp(p.logLikelihood - maxLL));
  const sumExp = expScores.reduce((s, e) => s + e, 0);

  return posteriors.map((p, i) => ({
    id: p.id,
    name: p.name,
    probability: expScores[i] / sumExp,
    phenotypes: p.phenotypes,
  })).sort((a, b) => b.probability - a.probability);
}

function entropy(probs) {
  let h = 0;
  for (const p of probs) {
    if (p > 1e-15) h -= p * Math.log2(p);
  }
  return h;
}

function suggestNextQuestions(diseases, observedPresent, observedAbsent, topN = 6) {
  const posteriors = computePosteriors(diseases, observedPresent, observedAbsent);
  const currentH = entropy(posteriors.map(p => p.probability));
  const already = new Set([...observedPresent, ...observedAbsent]);

  // Tous les HPO possibles pas encore observés
  const candidateHPOs = new Set();
  for (const d of diseases) {
    for (const hpo of Object.keys(d.phenotypes)) {
      if (!already.has(hpo)) candidateHPOs.add(hpo);
    }
  }

  const scored = [];
  for (const hpo of candidateHPOs) {
    // P(signe = oui) marginale
    let pYes = 0;
    for (const p of posteriors) {
      const pen = p.phenotypes[hpo] || DEFAULT_PENETRANCE;
      pYes += p.probability * pen;
    }
    const pNo = 1 - pYes;

    // Entropie si "oui"
    const postYes = computePosteriors(diseases, [...observedPresent, hpo], observedAbsent);
    const hYes = entropy(postYes.map(p => p.probability));

    // Entropie si "non"
    const postNo = computePosteriors(diseases, observedPresent, [...observedAbsent, hpo]);
    const hNo = entropy(postNo.map(p => p.probability));

    const expectedH = pYes * hYes + pNo * hNo;
    const infoGain = currentH - expectedH;

    scored.push({ hpo, infoGain, pYes });
  }

  scored.sort((a, b) => b.infoGain - a.infoGain);
  return scored.slice(0, topN);
}

const COLORS = {
  bg: "#0c0e13",
  surface: "#141720",
  surfaceHover: "#1a1e2a",

  borderFocus: "#4a6fa5",

  negative: "#d95b6a",

  goldGlow: "rgba(212,168,87,0.10)",
};

const font = "'JetBrains Mono', 'Fira Code', 'SF Mono', monospace";
const fontSans = "'IBM Plex Sans', 'Inter', system-ui, sans-serif";

const AkinatorV2 = function AkinatorV2() {
  const [phase, setPhase] = useState("input"); // input | refine
  const [cardinalSigns, setCardinalSigns] = useState([
    { hpo: null, polarity: "present" },
    { hpo: null, polarity: "present" },
    { hpo: null, polarity: "present" },
  ]);
  const [searchQueries, setSearchQueries] = useState(["", "", ""]);
  const [activeSearch, setActiveSearch] = useState(null);
  const [additionalObs, setAdditionalObs] = useState([]); // {hpo, polarity}
  const [ranking, setRanking] = useState([]);
  const [suggestions, setSuggestions] = useState([]);
  const searchRef = useRef(null);

  // Tous les HPO utilisés
  const allPresent = useMemo(() => {
    const fromCardinal = cardinalSigns.filter(s => s.hpo && s.polarity === "present").map(s => s.hpo);
    const fromAdditional = additionalObs.filter(o => o.polarity === "present").map(o => o.hpo);
    return [...fromCardinal, ...fromAdditional];
  }, [cardinalSigns, additionalObs]);

  const allAbsent = useMemo(() => {
    const fromCardinal = cardinalSigns.filter(s => s.hpo && s.polarity === "absent").map(s => s.hpo);
    const fromAdditional = additionalObs.filter(o => o.polarity === "absent").map(o => o.hpo);
    return [...fromCardinal, ...fromAdditional];
  }, [cardinalSigns, additionalObs]);

  // Compute ranking
  useEffect(() => {
    if (allPresent.length + allAbsent.length > 0) {
      const r = computePosteriors(DISEASES, allPresent, allAbsent);
      setRanking(r);
      if (phase === "refine") {
        const s = suggestNextQuestions(DISEASES, allPresent, allAbsent, 6);
        setSuggestions(s);
      }
    } else {
      setRanking([]);
      setSuggestions([]);
    }
  }, [allPresent, allAbsent, phase]);

  const handleSearch = useCallback((idx, query) => {
    const newQ = [...searchQueries];
    newQ[idx] = query;
    setSearchQueries(newQ);
  }, [searchQueries]);

  const selectHPO = useCallback((idx, hpoId) => {
    const newSigns = [...cardinalSigns];
    newSigns[idx] = { ...newSigns[idx], hpo: hpoId };
    setCardinalSigns(newSigns);
    const newQ = [...searchQueries];
    newQ[idx] = HPO_TERMS[hpoId]?.name || "";
    setSearchQueries(newQ);
    setActiveSearch(null);
  }, [cardinalSigns, searchQueries]);

  const togglePolarity = useCallback((idx) => {
    const newSigns = [...cardinalSigns];
    newSigns[idx] = {
      ...newSigns[idx],
      polarity: newSigns[idx].polarity === "present" ? "absent" : "present",
    };
    setCardinalSigns(newSigns);
  }, [cardinalSigns]);

  const addCardinalSlot = useCallback(() => {
    if (cardinalSigns.length < 6) {
      setCardinalSigns([...cardinalSigns, { hpo: null, polarity: "present" }]);
      setSearchQueries([...searchQueries, ""]);
    }
  }, [cardinalSigns, searchQueries]);

  const removeCardinalSlot = useCallback((idx) => {
    if (cardinalSigns.length > 2) {
      setCardinalSigns(cardinalSigns.filter((_, i) => i !== idx));
      setSearchQueries(searchQueries.filter((_, i) => i !== idx));
    }
  }, [cardinalSigns, searchQueries]);

  const startRefine = useCallback(() => {
    const filled = cardinalSigns.filter(s => s.hpo);
    if (filled.length < 2) return;
    setPhase("refine");
  }, [cardinalSigns]);

  const answerSuggestion = useCallback((hpo, polarity) => {
    setAdditionalObs(prev => [...prev, { hpo, polarity }]);
  }, []);

  const resetAll = useCallback(() => {
    setPhase("input");
    setCardinalSigns([
      { hpo: null, polarity: "present" },
      { hpo: null, polarity: "present" },
      { hpo: null, polarity: "present" },
    ]);
    setSearchQueries(["", "", ""]);
    setAdditionalObs([]);
    setRanking([]);
    setSuggestions([]);
    setActiveSearch(null);
  }, []);

  const filledCount = cardinalSigns.filter(s => s.hpo).length;
  const totalQuestions = allPresent.length + allAbsent.length;

  const filteredTerms = useCallback((query) => {
    if (!query || query.length < 2) return [];
    const q = query.toLowerCase();
    const selected = new Set(cardinalSigns.filter(s => s.hpo).map(s => s.hpo));
    const additional = new Set(additionalObs.map(o => o.hpo));
    return Object.entries(HPO_TERMS)
      .filter(([id, t]) =>
        !selected.has(id) && !additional.has(id) &&
        (t.name.toLowerCase().includes(q) || t.en.toLowerCase().includes(q) || id.toLowerCase().includes(q))

      color: COLORS.text,
      fontFamily: fontSans,
      padding: "20px",
      maxWidth: 900,
      margin: "0 auto",

        textAlign: "center",
        marginBottom: 30,
        borderBottom: `1px solid ${COLORS.border}`,
        paddingBottom: 16,

          fontFamily: font,
          fontSize: 13,
          color: COLORS.accent,
          letterSpacing: 3,
          textTransform: "uppercase",
          marginBottom: 6,

          fontSize: 26,
          fontWeight: 300,
          margin: 0,
          letterSpacing: -0.5,
          color: COLORS.text,

          fontSize: 12,
          color: COLORS.textMuted,
          marginTop: 4,
        }}>
          Diagnostic phénotypique bayésien — {DISEASES.length} syndromes • {Object.keys(HPO_TERMS).length} termes HPO
        </div>

            {i + 1}. {label}

      <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>

          {/* Cardinal signs input */}

            background: COLORS.surface,
            border: `1px solid ${COLORS.border}`,
            borderRadius: 10,
            padding: 16,
            marginBottom: 16,
          }}>
            <div style={{
              fontSize: 11,
              fontFamily: font,
              color: COLORS.textMuted,
              textTransform: "uppercase",
              letterSpacing: 1.5,

                    {sign.polarity === "present" ? "+" : "−"}

                  {/* Search input */}
                  <input

                  {phase === "input" && cardinalSigns.length > 2 && (

                      <div

                        style={{
                          padding: "8px 12px",
                          cursor: "pointer",
                          borderBottom: `1px solid ${COLORS.border}`,
                          transition: "background 0.15s",
                          fontSize: 12,
                        }}
                        onMouseEnter={e => e.target.style.background = COLORS.surfaceHover}
                        onMouseLeave={e => e.target.style.background = "transparent"}
                      >
                        <div style={{ color: COLORS.text }}>{term.name}</div>
                        <div style={{ color: COLORS.textMuted, fontSize: 10, fontFamily: font }}>
                          {term.id} — {term.en}

                      </div>
                    ))}
                    {filteredTerms(searchQueries[idx]).length === 0 && (
                      <div style={{ padding: 12, color: COLORS.textMuted, fontSize: 12 }}>
                        Aucun terme trouvé

            {phase === "input" && (

                  <button onClick={addCardinalSlot} style={{
                    padding: "6px 14px",
                    borderRadius: 6,
                    border: `1px dashed ${COLORS.border}`,
                    background: "transparent",
                    color: COLORS.textMuted,
                    cursor: "pointer",
                    fontSize: 12,
                  }}>+ Ajouter un signe</button>
                )}
                <button
                  onClick={startRefine}
                  disabled={filledCount < 2}
                  style={{
                    flex: 1,
                    padding: "8px 16px",
                    borderRadius: 6,
                    border: "none",
                    background: filledCount >= 2 ? COLORS.accent : COLORS.border,
                    color: filledCount >= 2 ? "#fff" : COLORS.textMuted,
                    cursor: filledCount >= 2 ? "pointer" : "not-allowed",
                    fontSize: 13,
                    fontWeight: 600,
                    fontFamily: fontSans,
                    transition: "all 0.2s",
                  }}
                >
                  Lancer l'analyse ({filledCount} signes)
                </button>
              </div>
            )}
          </div>

          {/* Suggestions (refine phase) */}
          {phase === "refine" && suggestions.length > 0 && (
            <div style={{
              background: COLORS.surface,
              border: `1px solid ${COLORS.border}`,
              borderRadius: 10,
              padding: 16,
              marginBottom: 16,
            }}>
              <div style={{
                fontSize: 11,
                fontFamily: font,
                color: COLORS.gold,
                textTransform: "uppercase",
                letterSpacing: 1.5,
                marginBottom: 12,
              }}>
                Questions discriminantes
              </div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 10 }}>
                Classées par gain d'information (entropie de Shannon)
              </div>
              {suggestions.map((s, i) => {
                const term = HPO_TERMS[s.hpo];
                if (!term) return null;
                const alreadyAnswered = additionalObs.some(o => o.hpo === s.hpo);
                if (alreadyAnswered) return null;
                return (
                  <div key={s.hpo} style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 8,
                    marginBottom: 6,
                    padding: "8px 10px",
                    borderRadius: 8,
                    background: i === 0 ? COLORS.goldGlow : "transparent",
                    border: `1px solid ${i === 0 ? COLORS.gold + "40" : COLORS.border}`,
                  }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: COLORS.text }}>{term.name}</div>
                      <div style={{
                        fontSize: 10, color: COLORS.textMuted, fontFamily: font,
                      }}>
                        IG={s.infoGain.toFixed(3)} bit · P(oui)={(s.pYes * 100).toFixed(0)}%
                      </div>
                    </div>
                    <button
                      onClick={() => answerSuggestion(s.hpo, "present")}
                      style={{
                        padding: "4px 10px",
                        borderRadius: 5,
                        border: `1px solid ${COLORS.positive}`,
                        background: COLORS.positiveGlow,
                        color: COLORS.positive,
                        cursor: "pointer",
                        fontSize: 11,
                        fontWeight: 600,
                      }}
                    >Oui</button>
                    <button
                      onClick={() => answerSuggestion(s.hpo, "absent")}
                      style={{
                        padding: "4px 10px",
                        borderRadius: 5,
                        border: `1px solid ${COLORS.negative}`,
                        background: COLORS.negativeGlow,
                        color: COLORS.negative,
                        cursor: "pointer",
                        fontSize: 11,
                        fontWeight: 600,
                      }}
                    >Non</button>
                  </div>
                );
              })}
            </div>

          {/* Observation history */}
          {additionalObs.length > 0 && (
            <div style={{
              background: COLORS.surface,
              border: `1px solid ${COLORS.border}`,
              borderRadius: 10,
              padding: 16,
            }}>
              <div style={{
                fontSize: 11,
                fontFamily: font,
                color: COLORS.textMuted,
                textTransform: "uppercase",
                letterSpacing: 1.5,

              }}>
                Observations ajoutées ({additionalObs.length})

              {additionalObs.map((obs, i) => (
                <div key={i} style={{
                  display: "flex",

              background: "transparent",
              color: COLORS.textMuted,
              cursor: "pointer",

        <div style={{ flex: "1 1 340px", minWidth: 280 }}>

                  <div style={{
